<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>わっしょい KJCOB — 活動報告</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

  :root {
    --bg: #000;
    --text: #f5f5f7;
    --text-muted: #86868b;
    --accent: #C896FF;
    --accent-2: #9B7EBD;
    --accent-bright: #E8C5FF;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Noto Sans JP", "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 22px;
    text-align: center;
    line-height: 1.5;
    letter-spacing: 0.02em;
    overflow-x: hidden;
    position: relative;
  }
  body::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 1400px; height: 1400px;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(232, 197, 255, 0.18) 0%, rgba(155, 126, 189, 0.08) 30%, transparent 60%);
    pointer-events: none;
    animation: pulse 8s ease-in-out infinite;
    z-index: 0;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
  }

  .wrap { position: relative; z-index: 1; max-width: 720px; width: 100%; }

  .eyebrow {
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 16px;
    letter-spacing: 3px;
  }

  h1 {
    font-size: clamp(40px, 7vw, 72px);
    font-weight: 700;
    letter-spacing: -0.025em;
    line-height: 1.1;
    margin-bottom: 16px;
  }
  h1 .gradient {
    background: linear-gradient(135deg, #E8C5FF 0%, #C896FF 50%, #9B7EBD 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    display: inline-block;
  }

  .subtitle {
    font-size: 18px;
    color: var(--text-muted);
    margin-bottom: 56px;
    max-width: 480px;
    margin-left: auto; margin-right: auto;
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin-bottom: 48px;
  }

  .card {
    display: block;
    padding: 40px 28px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 22px;
    text-decoration: none;
    color: var(--text);
    text-align: left;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(200, 150, 255, 0.08), transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: rgba(200, 150, 255, 0.4);
    box-shadow: 0 20px 40px rgba(200, 150, 255, 0.15);
  }
  .card:hover::before { opacity: 1; }

  .card-year {
    font-size: 14px;
    color: var(--accent);
    font-weight: 500;
    letter-spacing: 2px;
    margin-bottom: 8px;
    position: relative;
  }
  .card-title {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: -0.01em;
    position: relative;
  }
  .card-desc {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 24px;
    line-height: 1.6;
    position: relative;
  }
  .card-arrow {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--accent);
    font-size: 14px;
    font-weight: 500;
    position: relative;
    transition: gap 0.3s;
  }
  .card:hover .card-arrow { gap: 12px; }

  footer {
    margin-top: 32px;
    color: #6e6e73;
    font-size: 12px;
    letter-spacing: 0.5px;
    position: relative; z-index: 1;
  }

  @media (max-width: 540px) {
    .cards { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="eyebrow">活 動 報 告</div>
  <h1>わっしょい <span class="gradient">KJCOB</span></h1>
  <p class="subtitle">
    春日部市 藤まつりへの出展活動をふりかえって。
  </p>

  <div class="cards">
    <a href="fujimatsuri_2026.html" class="card">
      <div class="card-year">2026 — 最新</div>
      <div class="card-title">今年の藤まつり</div>
      <div class="card-desc">
        2年連続の出展。今年もたくさんの方にお越しいただきました。
      </div>
      <span class="card-arrow">レポートを見る →</span>
    </a>

    <a href="fujimatsuri_report.html" class="card">
      <div class="card-year">2025</div>
      <div class="card-title">昨年の活動報告</div>
      <div class="card-desc">
        スライム作り体験とポップコーン販売。事前研修から反省会まで。
      </div>
      <span class="card-arrow">レポートを見る →</span>
    </a>
  </div>

  <footer>© わっしょい KJCOB · 春日部市 藤まつり 出展報告</footer>
</div>

</body>
</html>
